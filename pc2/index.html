  <body>
    <div class="wrapper">
      <section>
<button id="startButton" type="button">Start Machine</button>
<div id="deskpro386" class="machine-placeholder">
  <p>[PCjs Machine "deskpro386"]</p>
  <p class="machine-warning">Waiting for machine "deskpro386" to load....</p>
</div>
      </section>
    </div>

    <script src="machines/pcx86/releases/3.00/pcx86v3.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        embedPCx86('deskpro386','machines/pcx86/compaq/deskpro386/vga/2048kb/machine.xml','machines/pcx86/xsl/components.css','{autoMount:{},floppyDrives:[{name:"Drive A (1.44MB)", type:"fdc", size:1440}],drives:[]}');
      });
    </script>

    <script src="tools/modules/web/explorer.js"></script>
    <script>
      document.getElementById('startButton').addEventListener('click', function() {
        if (window.pcjs && pcjs.machines && pcjs.machines['deskpro386']) {
          try {
            pcjs.machines['deskpro386'].run();
          } catch (e) {
            console.error("Error trying to run machine:", e);
            alert("Error trying to run machine. Check console for details.");
          }
        } else {
          alert('PCjs machine not ready yet. Please wait for it to load, or check for errors in the console.');
        }
      });
    </script>
