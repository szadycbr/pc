<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>v86 Emulator - Load Image</title>

<style>

body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }

#screen_container {

width: 640px; height: 480px; /* Or your preferred default size */

position: relative; /* For emulator elements like cursor */

border: 1px solid #ccc;

margin: 20px auto;

background-color: #000;

}

#screen_container > div { /* Inner div created by v86 for text mode */

white-space: pre;

font: 14px monospace; /* Adjust as needed */

line-height: 14px; /* Adjust as needed */

}

#screen_container > canvas { /* Canvas created by v86 for graphics mode */

display: none; /* Initially hidden, v86 manages display */

}

#controls { text-align: center; margin-bottom: 20px; }

#file-input { margin-right: 10px; }

#status { text-align: center; margin-top: 10px; font-style: italic; }

</style>

</head>

<body>


<div id="controls">

<input type="file" id="file-input" accept=".img,.IMG" />

<button id="start-button">Start Emulator with Selected Image</button>

</div>


<div id="screen_container">

<!-- Emulator will render here -->

</div>

<div id="status">Please select an image file and click start.</div>


<script src="libv86.js"></script>

<script>

"use strict";


const startButton = document.getElementById("start-button");

const fileInput = document.getElementById("file-input");

const screenContainer = document.getElementById("screen_container");

const statusDiv = document.getElementById("status");

let emulator = null; // To hold the emulator instance


startButton.addEventListener("click", () => {

if (fileInput.files.length === 0) {

statusDiv.textContent = "Please select a disk image file (.img) first.";

alert("Please select a disk image file (.img) first.");

return;

}


const disk_image_file = fileInput.files[0];

statusDiv.textContent = "Reading disk image: " + disk_image_file.name;


const reader = new FileReader();

reader.onload = function(e) {

const image_buffer = e.target.result; // This is an ArrayBuffer

statusDiv.textContent = "Disk image loaded. Starting emulator...";


// If an old emulator instance exists, destroy it first

if (emulator) {

try {

emulator.destroy();

} catch (err) {

console.warn("Error destroying previous emulator instance:", err);

}

emulator = null;

// Clear the screen container for the new instance

screenContainer.innerHTML = '<div style="white-space: pre; font: 14px monospace; line-height: 14px"></div><canvas style="display: none"></canvas>';

}

// --- v86 Emulator Configuration ---

emulator = new V86({

wasm_path: "v86.wasm", // Assuming v86.wasm is in the same directory

memory_size: 32 * 1024 * 1024, // 32MB, adjust as needed

vga_memory_size: 2 * 1024 * 1024, // 2MB, adjust as needed

screen_container: screenContainer,

// IMPORTANT: These BIOS files must exist at these paths relative to index.html

// You need to get them from the v86 project and add them to your repository.

// For example, create a 'bios' folder in your repo.

bios: {

url: "bios/seabios.bin", 

},

vga_bios: {

url: "bios/vgabios.bin",

},

// Load the selected disk image as the first floppy drive (fda)

fda: {

buffer: image_buffer 

},

// To boot from floppy, ensure fda is checked before hda/cdrom

// The default boot order in v86 usually prioritizes floppy if present.

// boot_order: 0x213, // Example: FD_FIRST then HD_FIRST then CD_FIRST (if needed)


autostart: true, // Automatically start when configuration is done

});


emulator.add_listener("emulator-loaded", () => {

statusDiv.textContent = "Emulator loaded. Booting...";

});


emulator.add_listener("emulator-started", () => {

statusDiv.textContent = "Emulator running with " + disk_image_file.name;

});

emulator.add_listener("emulator-stopped", () => {

statusDiv.textContent = "Emulator stopped. Select an image and click start to run again.";

});


// Log errors to console and status div

function handleEmulatorError(event_name, error) {

console.error("Emulator event error:", event_name, error);

statusDiv.textContent = "Emulator error: " + (error && error.message ? error.message : String(error));

}

emulator.add_listener("download-error", (err) => handleEmulatorError("download-error", err.request?.statusText || "File download failed"));


};


reader.onerror = function(e) {

statusDiv.textContent = "Error reading file.";

console.error("FileReader error:", e);

alert("Error reading the selected file.");

};


reader.readAsArrayBuffer(disk_image_file);

});

</script>

</body>

</html>
